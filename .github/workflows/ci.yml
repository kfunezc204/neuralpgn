name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Tests rely on node:sqlite; keep in sync with local dev (v24).
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
  # The Rust side (src-tauri) is intentionally not built here: a Tauri build
  # needs heavy Linux system deps (webkit2gtk, etc.) for little signal — the
  # crate is a thin plugin host. Revisit if src-tauri grows real logic.
